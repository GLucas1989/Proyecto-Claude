<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <!-- ElRubius signature dark bg with warm undertones -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0800"/>
      <stop offset="40%" stop-color="#1a0e00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </linearGradient>
    <!-- Signature orange/yellow gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <!-- Neon orange glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="430" fill="url(#bg)"/>
  <!-- Orange warmth glow -->
  <ellipse cx="460" cy="215" rx="440" ry="220" fill="url(#glow)"/>

  <!-- Diagonal speed lines (energetic youtuber vibe) -->
  <g opacity="0.06" stroke="#ff8800" stroke-width="1">
    <line x1="0" y1="100" x2="920" y2="60"/>
    <line x1="0" y1="160" x2="920" y2="120"/>
    <line x1="0" y1="270" x2="920" y2="310"/>
    <line x1="0" y1="330" x2="920" y2="370"/>
  </g>

  <!-- Corner brackets in orange -->
  <path d="M15,15 L90,15 L90,21 L21,21 L21,90 L15,90 Z" fill="#ff8800" opacity="0.8"/>
  <path d="M15,15 L50,15 L50,17 L17,17 L17,50 L15,50 Z" fill="#ffcc00"/>
  <path d="M905,15 L830,15 L830,21 L899,21 L899,90 L905,90 Z" fill="#ff8800" opacity="0.8"/>
  <path d="M905,15 L870,15 L870,17 L903,17 L903,50 L905,50 Z" fill="#ffcc00"/>
  <path d="M15,415 L90,415 L90,409 L21,409 L21,340 L15,340 Z" fill="#ff8800" opacity="0.8"/>
  <path d="M905,415 L830,415 L830,409 L899,409 L899,340 L905,340 Z" fill="#ff8800" opacity="0.8"/>

  <!-- Subscriber badge shape (YouTube red play button outline) -->
  <g transform="translate(460,185)" opacity="0.08">
    <rect x="-130" y="-70" width="260" height="140" rx="16" fill="none" stroke="#ffcc00" stroke-width="4"/>
    <polygon points="-30,-40 60,0 -30,40" fill="none" stroke="#ffcc00" stroke-width="3"/>
  </g>

  <!-- Separator lines -->
  <rect x="50" y="148" width="820" height="1" fill="url(#lineGrad)" opacity="0.9"/>
  <rect x="50" y="278" width="820" height="1" fill="url(#lineGrad)" opacity="0.9"/>

  <!-- Orange accent top bar -->
  <rect x="280" y="143" width="360" height="3.5" fill="#ffcc00" opacity="0.95"/>

  <!-- el -->
  <text x="460" y="206"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-size="32"
    font-weight="900"
    letter-spacing="3"
    fill="#ffaa00"
    text-anchor="middle"
    opacity="0.9">el</text>

  <!-- RUBIUS -->
  <text x="460" y="268"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-size="100"
    font-weight="900"
    letter-spacing="2"
    fill="url(#orangeGrad)"
    text-anchor="middle"
    filter="url(#softGlow)">RUBIUS</text>

  <!-- OMG tag -->
  <text x="460" y="296"
    font-family="'Arial Black', Impact, Arial, sans-serif"
    font-size="22"
    font-weight="900"
    letter-spacing="12"
    fill="#ffcc00"
    text-anchor="middle"
    opacity="0.85">OMG</text>

  <!-- Orange accent bottom bar -->
  <rect x="280" y="302" width="360" height="3.5" fill="#ffcc00" opacity="0.95"/>

  <!-- Stars / sparkle decoration -->
  <g fill="#ffcc00" opacity="0.5">
    <polygon points="120,80 124,92 136,92 126,100 130,112 120,104 110,112 114,100 104,92 116,92" transform="scale(0.6) translate(80,60)"/>
    <polygon points="800,80 804,92 816,92 806,100 810,112 800,104 790,112 794,100 784,92 796,92" transform="scale(0.6) translate(580,60)"/>
    <circle cx="140" cy="360" r="3"/>
    <circle cx="780" cy="360" r="3"/>
    <circle cx="460" cy="370" r="2" opacity="0.4"/>
  </g>

  <!-- Subscriber count hint -->
  <text x="460" y="340"
    font-family="Arial, sans-serif"
    font-size="11"
    letter-spacing="4"
    fill="#ff8800"
    text-anchor="middle"
    opacity="0.4">40M+ SUSCRIPTORES · YOUTUBE</text>

  <!-- Outer border -->
  <rect x="2" y="2" width="916" height="426" fill="none" stroke="#ff8800" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
