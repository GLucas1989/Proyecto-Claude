<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010b14"/>
      <stop offset="50%" stop-color="#03192e"/>
      <stop offset="100%" stop-color="#010d1a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8aa6e"/>
      <stop offset="50%" stop-color="#a07830"/>
      <stop offset="100%" stop-color="#785020"/>
    </linearGradient>
    <linearGradient id="blueGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ac8b9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8aa6e"/>
      <stop offset="100%" stop-color="#0ac8b9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#0a3a5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a3a5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="920" height="430" fill="url(#bg)"/>
  <ellipse cx="460" cy="200" rx="420" ry="210" fill="url(#glow)"/>

  <!-- Hextech border corners -->
  <path d="M15,15 L90,15 L90,20 L20,20 L20,90 L15,90 Z" fill="url(#goldGrad)" opacity="0.8"/>
  <path d="M905,15 L830,15 L830,20 L900,20 L900,90 L905,90 Z" fill="url(#goldGrad)" opacity="0.8"/>
  <path d="M15,415 L90,415 L90,410 L20,410 L20,340 L15,340 Z" fill="url(#goldGrad)" opacity="0.8"/>
  <path d="M905,415 L830,415 L830,410 L900,410 L900,340 L905,340 Z" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Crossed swords symbol -->
  <g transform="translate(460,185)" opacity="0.15">
    <line x1="-80" y1="-80" x2="80" y2="80" stroke="#c8aa6e" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="-80" x2="-80" y2="80" stroke="#c8aa6e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#c8aa6e" stroke-width="4"/>
  </g>

  <!-- Horizontal separator lines -->
  <rect x="50" y="152" width="820" height="1" fill="url(#blueGold)" opacity="0.7"/>
  <rect x="50" y="282" width="820" height="1" fill="url(#blueGold)" opacity="0.7"/>

  <!-- Teal accent -->
  <rect x="360" y="148" width="200" height="2.5" fill="#0ac8b9" opacity="0.9"/>

  <!-- LEAGUE OF -->
  <text x="460" y="197" font-family="'BeaufortforLOL', Georgia, serif" font-size="24" font-weight="bold" letter-spacing="10" fill="#c8aa6e" text-anchor="middle" opacity="0.95">LEAGUE OF</text>

  <!-- LEGENDS -->
  <text x="460" y="265" font-family="'BeaufortforLOL', Georgia, serif" font-size="88" font-weight="bold" letter-spacing="4" fill="url(#goldGrad)" text-anchor="middle">LEGENDS</text>

  <!-- Bottom teal accent -->
  <rect x="360" y="285" width="200" height="2.5" fill="#0ac8b9" opacity="0.9"/>

  <!-- Small teal dots -->
  <circle cx="410" cy="302" r="2.5" fill="#0ac8b9" opacity="0.8"/>
  <circle cx="460" cy="302" r="2.5" fill="#c8aa6e" opacity="0.9"/>
  <circle cx="510" cy="302" r="2.5" fill="#0ac8b9" opacity="0.8"/>

  <!-- Outer border -->
  <rect x="2" y="2" width="916" height="426" fill="none" stroke="#c8aa6e" stroke-width="1.5" stroke-opacity="0.2"/>
</svg>
