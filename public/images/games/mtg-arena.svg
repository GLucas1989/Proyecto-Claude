<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0510"/>
      <stop offset="50%" stop-color="#110820"/>
      <stop offset="100%" stop-color="#07030e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c8960a"/>
      <stop offset="100%" stop-color="#8a6200"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c8d4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c8d4"/>
      <stop offset="100%" stop-color="#00c8d4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b21a8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6b21a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="430" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="460" cy="215" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Decorative corner ornaments - top left -->
  <path d="M20,20 L80,20 L80,25 L25,25 L25,80 L20,80 Z" fill="url(#goldGrad)" opacity="0.7"/>
  <path d="M20,20 L50,20 L50,22 L22,22 L22,50 L20,50 Z" fill="url(#goldGrad)"/>
  <!-- top right -->
  <path d="M900,20 L840,20 L840,25 L895,25 L895,80 L900,80 Z" fill="url(#goldGrad)" opacity="0.7"/>
  <path d="M900,20 L870,20 L870,22 L898,22 L898,50 L900,50 Z" fill="url(#goldGrad)"/>
  <!-- bottom left -->
  <path d="M20,410 L80,410 L80,405 L25,405 L25,350 L20,350 Z" fill="url(#goldGrad)" opacity="0.7"/>
  <!-- bottom right -->
  <path d="M900,410 L840,410 L840,405 L895,405 L895,350 L900,350 Z" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Center planeswalker spark symbol - simplified pentagon -->
  <g transform="translate(460,215)" opacity="0.12">
    <polygon points="0,-130 123,-40 76,105 -76,105 -123,-40" fill="none" stroke="#c8960a" stroke-width="3"/>
    <polygon points="0,-80 75,-24 46,64 -46,64 -75,-24" fill="none" stroke="#c8960a" stroke-width="2"/>
  </g>

  <!-- Horizontal gold lines -->
  <rect x="60" y="158" width="800" height="1" fill="url(#tealGrad)" opacity="0.6"/>
  <rect x="60" y="272" width="800" height="1" fill="url(#tealGrad)" opacity="0.6"/>

  <!-- Teal accent line top -->
  <rect x="340" y="140" width="240" height="2" fill="#00c8d4" opacity="0.8"/>

  <!-- Main title: MAGIC THE GATHERING -->
  <text x="460" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="normal" letter-spacing="8" fill="#c8a020" text-anchor="middle" opacity="0.9">MAGIC THE GATHERING</text>

  <!-- Main logo text: ARENA -->
  <text x="460" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="bold" letter-spacing="6" fill="url(#goldGrad)" text-anchor="middle">ARENA</text>

  <!-- Teal accent line bottom -->
  <rect x="340" y="274" width="240" height="2" fill="#00c8d4" opacity="0.8"/>

  <!-- Subtitle dots -->
  <circle cx="400" cy="292" r="2" fill="#c8960a" opacity="0.7"/>
  <circle cx="460" cy="292" r="2" fill="#00c8d4" opacity="0.9"/>
  <circle cx="520" cy="292" r="2" fill="#c8960a" opacity="0.7"/>

  <!-- Border frame -->
  <rect x="2" y="2" width="916" height="426" fill="none" stroke="#c8960a" stroke-width="1.5" stroke-opacity="0.25"/>
  <rect x="8" y="8" width="904" height="414" fill="none" stroke="#c8960a" stroke-width="0.5" stroke-opacity="0.15"/>
</svg>
