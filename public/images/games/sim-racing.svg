    <!-- Descriptor -->
    <text x="63" y="310" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#FFFFFF" opacity="0.30">COCKPITS · TÉCNICA · ENDURANCE</text>

    <!-- Finish line flag icon (small) -->
