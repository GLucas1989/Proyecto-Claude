    <rect width="920" height="430" fill="url(#sr-glow)"/>
    <rect width="920" height="430" fill="url(#sr-glow2)"/>

    <!-- Speed lines (horizontal motion blur feel) -->
    <g opacity="0.5">
      <rect x="0" y="120" width="700" height="1" fill="#cc0000" opacity="0.08"/>
      <rect x="0" y="145" width="550" height="1" fill="#cc0000" opacity="0.05"/>
      <rect x="0" y="165" width="650" height="0.5" fill="#ffffff" opacity="0.04"/>
      <rect x="0" y="200" width="400" height="0.5" fill="#cc0000" opacity="0.06"/>
      <rect x="0" y="240" width="600" height="1" fill="#cc0000" opacity="0.05"/>
      <rect x="0" y="270" width="480" height="0.5" fill="#ffffff" opacity="0.03"/>
      <rect x="0" y="300" width="700" height="1" fill="#cc0000" opacity="0.07"/>
    </g>

