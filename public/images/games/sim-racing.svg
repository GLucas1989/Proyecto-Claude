    <!-- Corner decorative brackets — red -->
    <path d="M15,15 L55,15 L55,19 L19,19 L19,55 L15,55 Z" fill="#cc0000" opacity="0.7"/>
    <path d="M905,15 L865,15 L865,19 L901,19 L901,55 L905,55 Z" fill="#ffffff" opacity="0.3"/>
