      <stop offset="55%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <rect width="920" height="430" fill="url(#sr-fade-left)"/>

    <!-- Red-to-white-to-black diagonal gradient overlay on right -->
    <linearGradient id="sr-diag" x1="60%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>
    <rect width="920" height="430" fill="url(#sr-diag)"/>

    <!-- Red diagonal stripe accent -->
