<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <linearGradient id="sr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="45%" stop-color="#1a0505"/>
      <stop offset="75%" stop-color="#2a0505"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="sr-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="50%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="sr-rwb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cc1111"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="sr-glow" cx="55%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sr-glow2" cx="10%" cy="90%" r="30%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="sr-blur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="sr-blur2"><feGaussianBlur stdDeviation="4"/></filter>
    <clipPath id="sr-clip"><rect width="920" height="430"/></clipPath>
    <!-- Speed lines pattern -->
    <pattern id="sr-lines" x="0" y="0" width="80" height="430" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="430" fill="#cc0000" opacity="0.06"/>
    </pattern>
  </defs>

  <g clip-path="url(#sr-clip)">
