<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <!-- Valorant brand: deep black bg with red accent #FF4655 -->
    <linearGradient id="val-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#100608"/>
      <stop offset="100%" stop-color="#1a0308"/>
    </linearGradient>
    <linearGradient id="val-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4655"/>
      <stop offset="100%" stop-color="#cc2233"/>
    </linearGradient>
    <linearGradient id="val-slash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4655" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF4655" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="val-glow" cx="62%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FF4655" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF4655" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="val-glow2" cx="20%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#FF4655" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF4655" stop-opacity="0"/>
    </radialGradient>
    <filter id="val-blur"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="val-blur2"><feGaussianBlur stdDeviation="3"/></filter>
    <clipPath id="val-clip"><rect width="920" height="430"/></clipPath>
  </defs>

  <g clip-path="url(#val-clip)">
    <!-- Background -->
    <rect width="920" height="430" fill="url(#val-bg)"/>
    <rect width="920" height="430" fill="url(#val-glow)"/>
    <rect width="920" height="430" fill="url(#val-glow2)"/>

    <!-- Subtle grid lines -->
    <g opacity="0.04" stroke="#FF4655" stroke-width="0.5">
      <line x1="0" y1="86" x2="920" y2="86"/>
      <line x1="0" y1="172" x2="920" y2="172"/>
      <line x1="0" y1="258" x2="920" y2="258"/>
      <line x1="0" y1="344" x2="920" y2="344"/>
      <line x1="184" y1="0" x2="184" y2="430"/>
      <line x1="368" y1="0" x2="368" y2="430"/>
      <line x1="552" y1="0" x2="552" y2="430"/>
      <line x1="736" y1="0" x2="736" y2="430"/>
    </g>

    <!-- Large diagonal slash — signature Valorant design element -->
    <!-- Main slash glow behind -->
    <polygon points="480,0 620,0 340,430 200,430" fill="#FF4655" opacity="0.04" filter="url(#val-blur)"/>
    <!-- Main slash crisp -->
    <polygon points="510,0 530,0 250,430 230,430" fill="#FF4655" opacity="0.12"/>
    <!-- Secondary slash -->
    <polygon points="560,0 570,0 290,430 280,430" fill="#FF4655" opacity="0.06"/>
    <!-- Third thin slash -->
    <polygon points="470,0 474,0 194,430 190,430" fill="#FF4655" opacity="0.08"/>

    <!-- Right side diagonal accent block -->
    <polygon points="720,0 920,0 920,430 640,430" fill="#FF4655" opacity="0.03"/>
    <polygon points="820,0 920,0 920,220" fill="#FF4655" opacity="0.05"/>

    <!-- Valorant V logo — centered-right -->
    <g transform="translate(590,80)" opacity="0.92">
      <!-- V shape built from two angled rectangles — Valorant style -->
      <g filter="url(#val-blur2)" opacity="0.4">
        <polygon points="0,0 60,0 120,230 90,230 50,50 10,230 -20,230" fill="#FF4655"/>
      </g>
      <!-- Left arm of V -->
      <polygon points="20,0 74,0 124,225 100,225 56,28 32,0" fill="url(#val-red)"/>
      <!-- Right arm of V -->
      <polygon points="88,0 144,0 168,0 118,225 94,225 140,28" fill="url(#val-red)" opacity="0.9"/>
      <!-- V center bottom point -->
      <polygon points="100,225 118,225 109,265 100,255" fill="#FF4655"/>
    </g>

    <!-- Left content area -->
    <!-- Horizontal red line accent -->
    <rect x="60" y="180" width="300" height="2" fill="url(#val-red)" opacity="0.9"/>
    <rect x="60" y="184" width="180" height="1" fill="#FF4655" opacity="0.4"/>

    <!-- VALORANT wordmark -->
    <text x="60" y="165" font-family="'Arial Black', 'Impact', sans-serif" font-size="62" font-weight="900" letter-spacing="8" fill="#FFFFFF" opacity="0.97">VALORANT</text>

    <!-- Tagline -->
    <text x="63" y="218" font-family="'Arial', sans-serif" font-size="15" font-weight="400" letter-spacing="4" fill="#FF4655" opacity="0.9" text-transform="uppercase">TACTICAL SHOOTER · RIOT GAMES</text>

    <!-- Bottom descriptor -->
    <text x="63" y="310" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#FFFFFF" opacity="0.35">AGENTES · AIM · ESTRATEGIA</text>

    <!-- Small crosshair decorative element -->
    <g transform="translate(63,355)" opacity="0.5">
      <line x1="12" y1="0" x2="12" y2="6" stroke="#FF4655" stroke-width="1.5"/>
      <line x1="12" y1="18" x2="12" y2="24" stroke="#FF4655" stroke-width="1.5"/>
      <line x1="0" y1="12" x2="6" y2="12" stroke="#FF4655" stroke-width="1.5"/>
      <line x1="18" y1="12" x2="24" y2="12" stroke="#FF4655" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="2" fill="#FF4655"/>
    </g>
    <text x="95" y="361" font-family="'Arial', monospace" font-size="11" letter-spacing="3" fill="#FF4655" opacity="0.5">// CREATORS S-HUB</text>

    <!-- Corner decorative brackets -->
    <path d="M15,15 L55,15 L55,19 L19,19 L19,55 L15,55 Z" fill="#FF4655" opacity="0.6"/>
    <path d="M905,15 L865,15 L865,19 L901,19 L901,55 L905,55 Z" fill="#FF4655" opacity="0.6"/>
    <path d="M15,415 L55,415 L55,411 L19,411 L19,375 L15,375 Z" fill="#FF4655" opacity="0.6"/>
    <path d="M905,415 L865,415 L865,411 L901,411 L901,375 L905,375 Z" fill="#FF4655" opacity="0.6"/>

    <!-- Top border line -->
    <rect x="0" y="0" width="920" height="3" fill="url(#val-red)" opacity="0.8"/>
    <!-- Bottom border line -->
    <rect x="0" y="427" width="920" height="3" fill="url(#val-red)" opacity="0.4"/>
  </g>
</svg>
